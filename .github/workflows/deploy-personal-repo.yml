name: CD - Mirror to Personal Repo

on:
  workflow_run:
    workflows: ['Code Quality Check']
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to personal repository
        env:
          TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          git remote add personal "https://yk-graph:${TOKEN}@github.com/yk-graph/clarla-beauty.git"
          git push personal main --force
